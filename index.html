<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Heroes of Might and Magic IV - Browser Edition">
  <title>Heroes IV - Phaser Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #f0e6d2;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
    }
    #loading-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 1000;
    }
    #loading-screen h1 {
      font-size: 2.5em;
      color: #d4af37;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      margin-bottom: 20px;
      letter-spacing: 3px;
    }
    #loading-screen p {
      font-size: 1.2em;
      color: #aaa;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(212, 175, 55, 0.3);
      border-top-color: #d4af37;
      border-radius: 50%;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading-screen">
      <h1>⚔️ HEROES IV ⚔️</h1>
      <div class="spinner"></div>
      <p>Phaser Edition - Loading...</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
